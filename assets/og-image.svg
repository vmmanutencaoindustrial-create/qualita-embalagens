<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Fundo verde escuro Qualità -->
  <rect width="1200" height="630" fill="#2A5238"/>

  <!-- Pattern sutil de pontos -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#F5F1E8" opacity="0.06"/>
    </pattern>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A5238" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1F4530" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#fadeBottom)"/>

  <!-- Logo cream circular -->
  <g transform="translate(80 80)">
    <circle cx="60" cy="60" r="60" fill="#F5F1E8"/>
    <!-- Sacolinha verde dentro -->
    <g fill="#2A5238" transform="translate(60 60) scale(.5) translate(-100 -100)">
      <path d="M 50 70 L 150 70 L 156 86 L 148 158 Q 147 164 141 164 L 59 164 Q 53 164 52 158 L 44 86 Z"/>
      <path d="M 60 70 L 60 56 Q 60 44 75 44 Q 88 44 88 56 L 88 70 L 80 70 L 80 60 Q 80 52 75 52 Q 68 52 68 60 L 68 70 Z"/>
      <path d="M 140 70 L 140 56 Q 140 44 125 44 Q 112 44 112 56 L 112 70 L 120 70 L 120 60 Q 120 52 125 52 Q 132 52 132 60 L 132 70 Z"/>
    </g>
  </g>

  <!-- Brand text -->
  <text x="220" y="135"
        fill="#F5F1E8"
        font-family="'Bricolage Grotesque', system-ui, sans-serif"
        font-weight="700"
        font-size="58"
        letter-spacing="-2">Qualità</text>
  <text x="220" y="170"
        fill="#C4D9C8"
        font-family="system-ui, sans-serif"
        font-weight="400"
        font-size="22"
        letter-spacing="2"
        text-transform="uppercase">EMBALAGENS PLÁSTICAS</text>

  <!-- Tagline gigante -->
  <text x="80" y="320"
        fill="#F5F1E8"
        font-family="'Bricolage Grotesque', system-ui, sans-serif"
        font-weight="700"
        font-size="86"
        letter-spacing="-3">recicle.</text>
  <text x="80" y="410"
        fill="#C4D9C8"
        font-family="'Bricolage Grotesque', system-ui, sans-serif"
        font-weight="300"
        font-size="86"
        letter-spacing="-3">transforme.</text>
  <text x="80" y="500"
        fill="#D9A831"
        font-family="'Bricolage Grotesque', system-ui, sans-serif"
        font-weight="700"
        font-size="86"
        letter-spacing="-3">impacte.</text>

  <!-- Bottom strip -->
  <text x="80" y="585"
        fill="#C4D9C8"
        font-family="system-ui, sans-serif"
        font-weight="500"
        font-size="22"
        letter-spacing="1">Atacado com responsabilidade · Atendemos todo o Brasil</text>

  <!-- Recycle symbol top right -->
  <g transform="translate(1080 100)" fill="#F5F1E8" opacity="0.85">
    <circle r="55" fill="none" stroke="#F5F1E8" stroke-width="3" opacity="0.3"/>
    <g>
      <path d="M -15 -10 L -15 -22 L -22 -22 L -8 -38 L 6 -22 L -1 -22 L -1 -10 Z"/>
      <path d="M -15 -10 L -15 -22 L -22 -22 L -8 -38 L 6 -22 L -1 -22 L -1 -10 Z" transform="rotate(120)"/>
      <path d="M -15 -10 L -15 -22 L -22 -22 L -8 -38 L 6 -22 L -1 -22 L -1 -10 Z" transform="rotate(240)"/>
    </g>
  </g>
</svg>
